<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background:#f5f5f5; }
    .box { max-width:350px; margin:80px auto; padding:20px; background:white; border-radius:10px; }
    input { width:100%; padding:10px; margin:10px 0; }
    button { width:100%; padding:12px; background:#8b4f4f; color:white; border:none; border-radius:8px; }
  </style>
</head>

<body>
  <div class="box">
    <h2>Area Admin</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Accedi</button>
    <p id="msg"></p>
  </div>

<script>
function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === "luigiestro" && p === "estroflowers") {
    window.location.href = "admin.html";
  } else {
    document.getElementById("msg").innerHTML = "Credenziali errate";
  }
}
</script>

</body>
</html>
