<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Admin ESTRO FLOWERS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { margin-bottom: 10px; }
    .box { background: #fff; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    label { display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 15px; padding: 10px 15px; cursor: pointer; }
    #status { margin-top: 10px; }
  </style>
</head>
<body>

<h1>Admin ESTRO FLOWERS</h1>
<p>Carica foto e video direttamente dal tuo dispositivo e salvali nelle pagine.</p>

<div class="box">
  <h2>1. Dati contenuto</h2>

  <label>Tipo contenuto</label>
  <select id="type">
    <option value="image">Foto</option>
    <option value="video">Video</option>
  </select>

  <label>File da caricare</label>
  <input type="file" id="fileInput">

  <label>Sessione</label>
  <select id="session">
    <option value="bouquet">Bouquet</option>
    <option value="matrimonio">Matrimonio</option>
    <option value="comunione">Comunione</option>
    <option value="lauree">Lauree</option>
    <option value="pasqua">Pasqua</option>
    <option value="natale">Natale</option>
    <option value="sanvalentino">San Valentino</option>
    <option value="festadelladonna">Festa della Donna</option>
    <option value="homedecor">Home Decor</option>
  </select>
</div>

<div class="box">
  <h2>2. Salvataggio su JSONBin</h2>

  <label>BIN URL (es. https://api.jsonbin.io/v3/b/6a430ac3da38895dfe13066d)</label>
  <input id="binUrl" placeholder="Incolla qui il BIN della pagina">

  <label>Master Key JSONBin</label>
  <input id="masterKey" value="$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m">

  <button onclick="uploadAndSave()">Carica e Salva</button>

  <p id="status"></p>
</div>

<script>
const IMGBB_KEY = "f0f6554d550769eb046b20f36766f98e";

async function uploadAndSave() {
  const file = document.getElementById("fileInput").files[0];
  const type = document.getElementById("type").value;
  const session = document.getElementById("session").value;
  const binUrl = document.getElementById("binUrl").value.trim();
  const masterKey = document.getElementById("masterKey").value.trim();
  const status = document.getElementById("status");

  if (!file) {
    status.textContent = "Seleziona un file.";
    status.style.color = "red";
    return;
  }
  if (!binUrl || !masterKey) {
    status.textContent = "Compila BIN URL e Master Key.";
    status.style.color = "red";
    return;
  }

  status.textContent = "Caricamento file...";
  status.style.color = "black";

  let uploadUrl = "";

  try {
    if (type === "image") {
      const formData = new FormData();
      formData.append("image", file);

      const res = await fetch("https://api.imgbb.com/1/upload?key=" + IMGBB_KEY, {
        method: "POST",
        body: formData
      });
      const data = await res.json();
      if (!data.success) throw new Error("Errore ImgBB");
      uploadUrl = data.data.url;
    } else {
      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("https://file.io", {
        method: "POST",
        body: formData
      });
      const data = await res.json();
      if (!data.success && !data.link) throw new Error("Errore File.io");
      uploadUrl = data.link;
    }

    status.textContent = "File caricato, salvataggio su JSONBin...";
    status.style.color = "black";

    const latest = await fetch(binUrl + "/latest", {
      headers: { "X-Master-Key": masterKey }
    });
    const json = await latest.json();
    const record = json.record || {};
    const items = record.items || [];

    items.push({
      type,
      url: uploadUrl,
      session,
      createdAt: new Date().toISOString()
    });

    const putRes = await fetch(binUrl, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": masterKey
      },
      body: JSON.stringify({ items })
    });

    if (!putRes.ok) throw new Error("Errore nel salvataggio su JSONBin");

    status.textContent = "Contenuto salvato correttamente!";
    status.style.color = "green";
  } catch (e) {
    console.error(e);
    status.textContent = "Errore: " + e.message;
    status.style.color = "red";
  }
}
</script>

</body>
</html>
