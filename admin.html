<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Admin ESTRO FLOWERS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .box {
      max-width: 600px; margin: 0 auto 20px auto; background: #fff; padding: 20px;
      border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label { font-weight: bold; margin-top: 15px; display: block; }
    select, input[type="file"] {
      width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%; padding: 12px; background: #000; color: #fff;
      border: none; border-radius: 8px; margin-top: 20px; font-size: 16px;
    }
    .media-item {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee;
    }
    .media-item img {
      width: 80px; height: 80px; object-fit: cover; border-radius: 8px;
    }
    .delete-btn {
      background: red; color: #fff; padding: 8px 12px; border-radius: 6px; border: none;
    }
  </style>
</head>

<body>

<h1>Admin ESTRO FLOWERS</h1>

<div class="box">
  <label>Foto da caricare</label>
  <input type="file" id="fileInput" accept="image/*">

  <label>Categoria</label>
  <select id="session">
    <option value="bouquet">Bouquet</option>
    <option value="eventi">Eventi</option>
    <option value="matrimonio">Matrimonio</option>
    <option value="comunione">Comunione</option>
    <option value="lauree">Lauree</option>
    <option value="pasqua">Pasqua</option>
    <option value="natale">Natale</option>
    <option value="sanvalentino">San Valentino</option>
    <option value="festadelladonna">Festa della Donna</option>
    <option value="homedecor">Home Decor</option>
  </select>

  <button onclick="upload()">Carica e Salva</button>
</div>

<div class="box">
  <h2>Gestione contenuti</h2>
  <div id="mediaContainer"></div>
</div>

<script>
  const bins = {
    bouquet: "https://api.jsonbin.io/v3/b/6a430ac3da38895dfe13066d",
    eventi: "https://api.jsonbin.io/v3/b/6a430aa0da38895dfe1305ec",
    matrimonio: "https://api.jsonbin.io/v3/b/6a430b07da38895dfe13074b",
    comunione: "https://api.jsonbin.io/v3/b/6a430b49da38895dfe13086b",
    lauree: "https://api.jsonbin.io/v3/b/6a430b32da38895dfe130814",
    pasqua: "https://api.jsonbin.io/v3/b/6a43156bf5f4af5e2944bdff",
    natale: "https://api.jsonbin.io/v3/b/6a43155bf5f4af5e2944bdd2",
    sanvalentino: "https://api.jsonbin.io/v3/b/6a430b5fda38895dfe1308c8",
    festadelladonna: "https://api.jsonbin.io/v3/b/6a430b76f5f4af5e29449aa0",
    homedecor: "https://api.jsonbin.io/v3/b/6a430aeaf5f4af5e29449899"
  };

  const masterKey = "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m";

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject("Errore lettura file");
      reader.readAsDataURL(file);
    });
  }

  async function upload() {
    const session = document.getElementById("session").value;
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
      alert("Seleziona una foto");
      return;
    }

    const base64 = await toBase64(file);
    const binUrl = bins[session];

    const response = await fetch(binUrl + "/latest", {
      headers: { "X-Master-Key": masterKey }
    });
    const data = await response.json();
    const items = data.record.items || [];

    items.push({ type: "image", session, url: base64 });

    await fetch(binUrl, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": masterKey
      },
      body: JSON.stringify({ items })
    });

    loadMedia();
    alert("Foto caricata!");
  }

  async function loadMedia() {
    const session = document.getElementById("session").value;
    const binUrl = bins[session];

    const response = await fetch(binUrl + "/latest", {
      headers: { "X-Master-Key": masterKey }
    });
    const data = await response.json();
    const items = data.record.items || [];

    const container = document.getElementById("mediaContainer");
    container.innerHTML = "";

    items
      .filter(i => i.session === session)
      .forEach((item, index) => {
        container.innerHTML += `
          <div class="media-item">
            <img src="${item.url}">
            <button class="delete-btn" onclick="deleteItem(${index})">Elimina</button>
          </div>
        `;
      });
  }

  async function deleteItem(index) {
    const session = document.getElementById("session").value;
    const binUrl = bins[session];

    const response = await fetch(binUrl + "/latest", {
      headers: { "X-Master-Key": masterKey }
    });
    const data = await response.json();
    const items = data.record.items || [];

    items.splice(index, 1);

    await fetch(binUrl, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": masterKey
      },
      body: JSON.stringify({ items })
    });

    loadMedia();
  }

  loadMedia();
</script>

</body>
</html>
