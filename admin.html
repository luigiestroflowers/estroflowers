<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AREA ADMIN - ESTRO FLOWERS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="IMG_9611.png" class="sidebar-logo" alt="ESTRO FLOWERS">
      <h3>ESTRO FLOWERS</h3>
    </div>

    <ul class="sidebar-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="bouquet.html">Bouquet</a></li>
      <li><a href="eventi.html">Eventi</a></li>
      <li><a href="homedecor.html">Home Decor</a></li>
      <li><a href="significato-fiori.html">Fiori & Significato</a></li>
      <li><a href="admin.html" class="active">Area Admin</a></li>
    </ul>
  </div>

  <button class="menu-toggle" id="menu-toggle">☰</button>
</header>

<section class="hero-full">
  <div class="overlay"></div>

  <div class="hero-content">
    <img src="IMG_9611.png" class="hero-logo" alt="ESTRO FLOWERS">

    <h1>AREA ADMIN<br><span>ESTRO FLOWERS di Luigi Estro</span></h1>

    <p class="hero-subtitle">
      Gestione foto e video del sito
    </p>
  </div>
</section>

<main style="padding:20px;">

  <h2 style="text-align:center; color:#8b4f4f;">Gestione Media</h2>

  <!-- BOX PER INSERIRE IL TOKEN -->
  <div style="margin: 20px auto; padding: 15px; background: #fff3cd; border: 1px solid #ffeeba; width: 80%; text-align:center;">
    <label><strong>Inserisci il tuo GitHub Token:</strong></label><br><br>
    <input id="tokenInput" type="password" placeholder="ghp_..." style="width: 300px; padding: 8px;">
    <button onclick="setToken()" style="padding: 8px 15px; margin-left: 10px;">Usa Token</button>
  </div>

  <div style="text-align:center; margin-bottom:20px;">
    <label for="folderSelect" style="font-size:18px;">Seleziona categoria:</label>
    <select id="folderSelect" style="padding:10px; font-size:16px;">
      <option value="bouquet">Bouquet</option>
      <option value="eventi">Eventi</option>
      <option value="matrimonio">Matrimonio</option>
      <option value="homedecor">Home Decor</option>
      <option value="comunione">Comunione</option>
      <option value="lauree">Lauree</option>
      <option value="pasqua">Pasqua</option>
      <option value="natale">Natale</option>
      <option value="sanvalentino">San Valentino</option>
      <option value="festadelladonna">Festa della Donna</option>
    </select>
  </div>

  <div id="mediaContainer" class="grid"></div>

</main>

<script>

  let GITHUB_TOKEN = "";

  function setToken() {
    GITHUB_TOKEN = document.getElementById("tokenInput").value.trim();
    alert("Token impostato correttamente!");
  }

  const REPO = "luigiestroflowers/estroflowers";

  const folders = {
    bouquet: "img/bouquet",
    eventi: "img/eventi",
    matrimonio: "img/matrimonio",
    homedecor: "img/homedecor",
    comunione: "img/comunione",
    lauree: "img/lauree",
    pasqua: "img/pasqua",
    natale: "img/natale",
    sanvalentino: "img/sanvalentino",
    festadelladonna: "img/festadelladonna"
  };

  async function loadMedia() {

    if (!GITHUB_TOKEN) {
      alert("Inserisci il token prima di caricare i media.");
      return;
    }

    const folder = folders[document.getElementById("folderSelect").value];
    const url = `https://api.github.com/repos/${REPO}/contents/${folder}`;

    const response = await fetch(url, {
      headers: { Authorization: `token ${GITHUB_TOKEN}` }
    });

    if (!response.ok) {
      alert("Errore: token non valido o permessi insufficienti.");
      return;
    }

    const files = await response.json();
    const container = document.getElementById("mediaContainer");
    container.innerHTML = "";

    files.forEach(file => {
      const isVideo = file.name.endsWith(".mp4") || file.name.endsWith(".mov");

      container.innerHTML += `
        <div class="card">
          ${isVideo
            ? `<video controls src="${file.download_url}" class="video-card"></video>`
            : `<img src="${file.download_url}" class="image-card">`
          }
          <button class="delete-btn" onclick="deleteFile('${folder}', '${file.name}')">Elimina</button>
        </div>
      `;
    });
  }

  async function deleteFile(folder, filename) {

    if (!GITHUB_TOKEN) {
      alert("Inserisci il token prima di eliminare file.");
      return;
    }

    const url = `https://api.github.com/repos/${REPO}/contents/${folder}/${filename}`;

    const response = await fetch(url, {
      headers: { Authorization: `token ${GITHUB_TOKEN}` }
    });

    const data = await response.json();

    await fetch(url, {
      method: "DELETE",
      headers: {
        Authorization: `token ${GITHUB_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: `Delete ${filename}`,
        sha: data.sha
      })
    });

    loadMedia();
  }

  document.getElementById("folderSelect").addEventListener("change", loadMedia);

  const toggle = document.getElementById("menu-toggle");
  const sidebar = document.getElementById("sidebar");
  toggle.addEventListener("click", () => sidebar.classList.toggle("open"));

</script>

</body>
</html>
