<script>
  const bins = {
    bouquet: "https://api.jsonbin.io/v3/b/6a430ac3da38895dfe13066d",
    eventi: "https://api.jsonbin.io/v3/b/6a430aa0da38895dfe1305ec",
    matrimonio: "https://api.jsonbin.io/v3/b/6a430b07da38895dfe13074b",
    comunione: "https://api.jsonbin.io/v3/b/6a430b49da38895dfe13086b",
    lauree: "https://api.jsonbin.io/v3/b/6a430b32da38895dfe130814",
    pasqua: "https://api.jsonbin.io/v3/b/6a43156bf5f4af5e2944bdff",
    natale: "https://api.jsonbin.io/v3/b/6a43155bf5f4af5e2944bdd2",
    sanvalentino: "https://api.jsonbin.io/v3/b/6a430b5fda38895dfe1308c8",
    festadelladonna: "https://api.jsonbin.io/v3/b/6a430b76f5f4af5e29449aa0",
    homedecor: "https://api.jsonbin.io/v3/b/6a430aeaf5f4af5e29449899"
  };

  const masterKey = "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m";

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject("Errore lettura file");
      reader.readAsDataURL(file);
    });
  }

  async function upload() {
    const session = document.getElementById("session").value;
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
      alert("Seleziona una foto");
      return;
    }

    const base64 = await toBase64(file);
    const binUrl = bins[session];

    try {
      const response = await fetch(binUrl + "/latest", {
        headers: { "X-Master-Key": masterKey }
      });

      if (!response.ok) {
        alert("ERRORE GET: " + response.status);
        return;
      }

      const data = await response.json();
      const items = data.record.items || [];

      items.push({ type: "image", session, url: base64 });

      const putRes = await fetch(binUrl, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": masterKey
        },
        body: JSON.stringify({ items })
      });

      if (!putRes.ok) {
        alert("ERRORE PUT: " + putRes.status);
        return;
      }

      alert("Foto caricata!");
      loadMedia();

    } catch (err) {
      alert("ERRORE GENERALE: " + err);
    }
  }

  async function loadMedia() {
    const session = document.getElementById("session").value;
    const binUrl = bins[session];

    try {
      const response = await fetch(binUrl + "/latest", {
        headers: { "X-Master-Key": masterKey }
      });

      if (!response.ok) {
        alert("ERRORE GET MEDIA: " + response.status);
        return;
      }

      const data = await response.json();
      const items = data.record.items || [];

      const container = document.getElementById("mediaContainer");
      container.innerHTML = "";

      items
        .filter(i => i.session === session)
        .forEach((item, index) => {
          container.innerHTML += `
            <div class="media-item">
              <img src="${item.url}">
              <button class="delete-btn" onclick="deleteItem(${index})">Elimina</button>
            </div>
          `;
        });

    } catch (err) {
      alert("ERRORE MEDIA: " + err);
    }
  }

  async function deleteItem(index) {
    const session = document.getElementById("session").value;
    const binUrl = bins[session];

    try {
      const response = await fetch(binUrl + "/latest", {
        headers: { "X-Master-Key": masterKey }
      });

      if (!response.ok) {
        alert("ERRORE GET DELETE: " + response.status);
        return;
      }

      const data = await response.json();
      const items = data.record.items || [];

      items.splice(index, 1);

      const putRes = await fetch(binUrl, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": masterKey
        },
        body: JSON.stringify({ items })
      });

      if (!putRes.ok) {
        alert("ERRORE PUT DELETE: " + putRes.status);
        return;
      }

      loadMedia();

    } catch (err) {
      alert("ERRORE DELETE: " + err);
    }
  }

  loadMedia();
</script>
