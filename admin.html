<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Upload - Estro Flowers</title>
<style>
  body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
  }
  .box {
    background: white;
    padding: 20px;
    border-radius: 10px;
  }
  input[type="file"] {
    margin-bottom: 15px;
  }
  button {
    padding: 10px 20px;
    background: #d63384;
    color: white;
    border: none;
    border-radius: 5px;
  }
  #result {
    margin-top: 20px;
    padding: 10px;
    background: #e8ffe8;
    border-radius: 5px;
  }
</style>
</head>
<body>

<div class="box">
  <h2>Carica Foto/Video</h2>

  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Carica</button>

  <div id="result"></div>
</div>

<script>
async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) {
    alert("Seleziona un file prima!");
    return;
  }

  const formData = new FormData();
  formData.append("image", file);

  const upload = await fetch("https://api.imgbb.com/1/upload?key=f602441e44e84496345be35382857e85", {
    method: "POST",
    body: formData
  });

  const data = await upload.json();

  if (data && data.data && data.data.url) {
    const imageUrl = data.data.url;

    document.getElementById("result").innerHTML = `
      <strong>Upload riuscito!</strong><br>
      URL immagine:<br>
      <input type="text" value="${imageUrl}" style="width:100%">
      <br><br>
      <img src="${imageUrl}" style="max-width:200px; border-radius:10px;">
    `;
  } else {
    document.getElementById("result").innerHTML = `
      <strong>Errore nell'upload.</strong>
    `;
  }
}
</script>

</body>
</html>
