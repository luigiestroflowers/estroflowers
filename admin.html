<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Area Admin - ESTRO FLOWERS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2 style="text-align:center; margin-top:20px;">Area Admin</h2>
<p style="text-align:center;">Carica immagini e video nelle sessioni del sito</p>

<div style="max-width:400px; margin:20px auto;">

  <label>Seleziona la sessione:</label>
  <select id="session-select" style="width:100%; padding:10px; margin-bottom:20px;">
    <option value="bouquet">Bouquet</option>
    <option value="homedecor">Home Decor</option>
    <option value="matrimonio">Matrimonio</option>
    <option value="lauree">Lauree</option>
    <option value="comunione">Comunione</option>
    <option value="natale">Natale</option>
    <option value="pasqua">Pasqua</option>
    <option value="sanvalentino">San Valentino</option>
    <option value="festadonne">Festa delle Donne</option>
  </select>

  <!-- INPUT FILE VISIBILE (FUNZIONA SU MOBILE) -->
  <input id="file-input" type="file" accept="image/*,video/*"
    <button id="confirm-upload" 
        style="width:100%; padding:12px; background:#2a7; color:white; border:none; border-radius:8px; margin-top:10px;">
  Conferma caricamento Ô£ö
</button>

         

  <p id="result" style="margin-top:20px; font-size:14px; color:#333;"></p>

</div>

<script>
  const apiKey = "public_W23MTff6zPdHapRZH7EQSrf";
  const fileInput = document.getElementById("file-input");
  const result = document.getElementById("result");
  const sessionSelect = document.getElementById("session-select");

  async function uploadFile(file) {

    // 1´©ÅÔâú CARICO SU UPLOAD.IO
    const formData = new FormData();
    formData.append("file", file);

    const upload = await fetch("https://api.bytescale.com/v2/files/upload?apiKey=" + apiKey, {
      method: "POST",
      body: formData
    });

    const json = await upload.json();
    const fileUrl = json.files[0].fileUrl;

    // 2´©ÅÔâú LEGGO IL JSON ATTUALE
    const current = await fetch("https://api.jsonbin.io/v3/b/6a4291bbda38895dfe10daed/latest", {
      headers: { "X-Master-Key": "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m" }
    }).then(r => r.json());

    const items = current.record.items || [];

    // 3´©ÅÔâú AGGIUNGO LA NUOVA FOTO
    items.push({
      session: sessionSelect.value,
      url: fileUrl,
      type: file.type.startsWith("video") ? "video" : "image"
    });

    // 4´©ÅÔâú SALVO IL JSON AGGIORNATO
    await fetch("https://api.jsonbin.io/v3/b/6a4291bbda38895dfe10daed", {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m"
      },
      body: JSON.stringify({ items })
    });

    // 5´©ÅÔâú MOSTRO LA CONFERMA
    result.innerHTML = `
      <strong>Caricato!</strong><br>
      Sessione: ${sessionSelect.value}<br>
      Link: ${fileUrl}
    `;
  }

  // ­şöÑ QUESTA ├ê LA PARTE CHE PRIMA NON FUNZIONAVA
  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (file) uploadFile(file);
  });
</script>

<script>
  const apiKey = "public_W23MTff6zPdHapRZH7EQSrf";
  const fileInput = document.getElementById("file-input");
  const confirmBtn = document.getElementById("confirm-upload");
  const result = document.getElementById("result");
  const sessionSelect = document.getElementById("session-select");

  async function uploadFile(file) {

    // 1´©ÅÔâú CARICO SU UPLOAD.IO
    const formData = new FormData();
    formData.append("file", file);

    const upload = await fetch("https://api.bytescale.com/v2/files/upload?apiKey=" + apiKey, {
      method: "POST",
      body: formData
    });

    const json = await upload.json();
    const fileUrl = json.files[0].fileUrl;

    // 2´©ÅÔâú LEGGO IL JSON ATTUALE
    const current = await fetch("https://api.jsonbin.io/v3/b/6a4291bbda38895dfe10daed/latest", {
      headers: { "X-Master-Key": "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m" }
    }).then(r => r.json());

    const items = current.record.items || [];

    // 3´©ÅÔâú AGGIUNGO LA NUOVA FOTO/VIDEO
    items.push({
      session: sessionSelect.value,
      url: fileUrl,
      type: file.type.startsWith("video") ? "video" : "image"
    });

    // 4´©ÅÔâú SALVO IL JSON AGGIORNATO
    await fetch("https://api.jsonbin.io/v3/b/6a4291bbda38895dfe10daed", {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m"
      },
      body: JSON.stringify({ items })
    });

    // 5´©ÅÔâú MOSTRO LA CONFERMA
    result.innerHTML = `
      <strong>Caricato!</strong><br>
      Sessione: ${sessionSelect.value}<br>
      Link: ${fileUrl}
    `;
  }

  // ­şöÑ ORA IL CARICAMENTO PARTE SOLO QUANDO PREMI "CONFERMA"
  confirmBtn.onclick = () => {
    const file = fileInput.files[0];
    if (!file) {
      result.innerHTML = "<strong>Seleziona prima un file!</strong>";
      return;
    }
    uploadFile(file);
  };
</script>

</body>
</html>
