<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Area Admin - ESTRO FLOWERS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: Arial; padding: 20px; background: #f5f5f5; }
  .box { background: white; padding: 20px; border-radius: 10px; }
  select, input[type="file"], button {
    width: 100%; padding: 12px; margin-bottom: 15px;
    border-radius: 8px; border: 1px solid #ccc;
  }
  button { background: #d63384; color: white; border: none; }
  #result { margin-top: 20px; padding: 10px; background: #e8ffe8; border-radius: 5px; }
</style>
</head>
<body>

<div class="box">
  <h2>Carica Foto o Video</h2>

  <label>Seleziona la categoria:</label>
  <select id="session">
    <option value="bouquet">Bouquet</option>
    <option value="eventi">Eventi</option>
    <option value="matrimonio">Matrimonio</option>
    <option value="natale">Natale</option>
    <option value="lauree">Lauree</option>
    <option value="sanvalentino">San Valentino</option>
    <option value="festadelladonna">Festa della Donna</option>
    <option value="comunione">Comunione</option>
    <option value="pasqua">Pasqua</option>
    <option value="homedecor">Home Decor</option>
  </select>

  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Carica</button>

  <div id="result"></div>
</div>

<script>
const bins = {
  bouquet: "https://api.jsonbin.io/v3/b/6a430ac3da38895dfe13066d",
  eventi: "https://api.jsonbin.io/v3/b/6a430aa0da38895dfe1305ec",
  matrimonio: "https://api.jsonbin.io/v3/b/6a430b07da38895dfe13074b",
  natale: "https://api.jsonbin.io/v3/b/6a43155bf5f4af5e2944bdd2",
  lauree: "https://api.jsonbin.io/v3/b/6a430b32da38895dfe130814",
  sanvalentino: "https://api.jsonbin.io/v3/b/6a430b5fda38895dfe1308c8",
  festadelladonna: "https://api.jsonbin.io/v3/b/6a430b76f5f4af5e29449aa0",
  comunione: "https://api.jsonbin.io/v3/b/6a430b49da38895dfe13086b",
  pasqua: "https://api.jsonbin.io/v3/b/6a43156bf5f4af5e2944bdff",
  homedecor: "https://api.jsonbin.io/v3/b/6a430aeaf5f4af5e29449899"
};

const MASTER_KEY = "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m";

async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  const session = document.getElementById("session").value;

  if (!file) {
    alert("Seleziona un file prima!");
    return;
  }

  // 1️⃣ Carica su ImgBB (foto o video)
  const formData = new FormData();
  formData.append("image", file);

  const upload = await fetch("https://api.imgbb.com/1/upload?key=a70d17601b1707149b76fd76011c7f0e", {
    method: "POST",
    body: formData
  });

  const data = await upload.json();
  const mediaUrl = data.data.url;

  // 2️⃣ Leggi il BIN della categoria
  const binUrl = bins[session];
  const binResponse = await fetch(binUrl + "/latest", {
    headers: { "X-Master-Key": MASTER_KEY }
  });
  const binData = await binResponse.json();

  const items = binData.record.items || [];

  // 3️⃣ Determina se è foto o video
  const type = file.type.startsWith("video") ? "video" : "image";

  // 4️⃣ Aggiungi nuovo elemento
  items.push({
    session: session,
    type: type,
    url: mediaUrl
  });

  // 5️⃣ Riscrivi il BIN
  await fetch(binUrl, {
    method: "PUT",
    headers: {
      "X-Master-Key": MASTER_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ items })
  });

  // 6️⃣ Feedback
  document.getElementById("result").innerHTML = `
    <strong>Caricato!</strong><br>
    URL: ${mediaUrl}<br><br>
    ${type === "image" ? `<img src="${mediaUrl}" style="max-width:200px;">` : `<video src="${mediaUrl}" controls style="max-width:200px;"></video>`}
  `;
}
</script>

</body>
</html>
