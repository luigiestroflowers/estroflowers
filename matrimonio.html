<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Matrimonio - ESTRO FLOWERS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="IMG_9611.png" class="sidebar-logo" alt="ESTRO FLOWERS">
      <h3>ESTRO FLOWERS</h3>
    </div>

    <ul class="sidebar-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="bouquet.html">Bouquet</a></li>
      <li><a href="eventi.html">Eventi</a></li>
      <li><a href="matrimonio.html" class="active">Matrimonio</a></li>
      <li><a href="homedecor.html">Home Decor</a></li>
      <li><a href="significato-fiori.html">Fiori & Significato</a></li>
    </ul>
  </div>

  <button class="menu-toggle" id="menu-toggle">☰</button>
</header>

<section class="hero-full">
  <div class="overlay"></div>

  <div class="hero-content">
    <img src="IMG_9611.png" class="hero-logo" alt="ESTRO FLOWERS">
    <h1>Matrimonio<br><span>ESTRO FLOWERS</span></h1>
    <p class="hero-subtitle">Allestimenti floreali per il tuo giorno speciale</p>
  </div>
</section>

<main>
  <h2 style="text-align:center; color:#8b4f4f;">Matrimonio</h2>
  <p class="section-subtitle" style="text-align:center;">Galleria aggiornata automaticamente</p>

  <div id="matrimonioContainer" class="grid"></div>
</main>

<script>
  const REPO = "luigiestroflowers/estroflowers";
  const FOLDER = "img/matrimonio";

  async function loadMatrimonio() {
    const url = `https://api.github.com/repos/${REPO}/contents/${FOLDER}`;

    const response = await fetch(url);
    if (!response.ok) {
      document.getElementById("matrimonioContainer").innerHTML =
        "<p style='text-align:center; color:#8b4f4f;'>Nessuna immagine trovata.</p>";
      return;
    }

    const files = await response.json();
    const container = document.getElementById("matrimonioContainer");
    container.innerHTML = "";

    files.forEach(file => {
      const isVideo = file.name.endsWith(".mp4") || file.name.endsWith(".mov");

      container.innerHTML += `
        <div class="card">
          ${isVideo
            ? `<video controls src="${file.download_url}" class="video-card"></video>`
            : `<img src="${file.download_url}" class="image-card">`
          }

          <div class="btn-row">
            <a class="like-btn" href="#">Like</a>
            <a class="order-btn" href="contatti.html">Ordina</a>
          </div>
        </div>
      `;
    });
  }

  loadMatrimonio();

  const toggle = document.getElementById("menu-toggle");
  const sidebar = document.getElementById("sidebar");
  toggle.addEventListener("click", () => sidebar.classList.toggle("open"));
</script>

</body>
</html>
