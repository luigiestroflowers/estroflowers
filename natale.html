<body>

<header>

    <div class="sidebar-header">
      <img src="IMG_9611.png" class="sidebar-logo">

<section class="hero-full">
  <div class="overlay"></div>

  <div class="hero-content">
    <img src="IMG_9611.png" class="hero-logo">
    <h1>Natale</h1>
    <p class="hero-subtitle">Decorazioni natalizie e composizioni invernali</p>
  </div>
</section>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>
  const toggle = document.getElementById("menu-toggle");
  const sidebar = document.getElementById("sidebar");
  toggle.addEventListener("click", () => sidebar.classList.toggle("open"));
</script>

<!-- SCRIPT DINAMICO PER FOTO + VIDEO -->
<script>
fetch("https://api.jsonbin.io/v3/b/6a43155bf5f4af5e2944bdd2/latest", {
  headers: { "X-Master-Key": "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m" }
})
.then(r => r.json())
.then(data => {
  const items = data.record.items || [];
  const grid = document.getElementById("grid");

  items
    .filter(item => item.session === "natale")
    .forEach(item => {
      const isImage = item.type === "image";
      const mediaTag = isImage
        ? `<img src="${item.url}" alt="Natale">`
        : `<video src="${item.url}" controls muted playsinline></video>`;

      grid.innerHTML += `
        <div class="card">
          ${mediaTag}
          <div class="btn-row">
            <a href="https://wa.me/393400532931?text=Ciao%20Luigi,%20mi%20piace%20questa%20creazione:%20${encodeURIComponent(item.url)}" class="like-btn">❤️ Like</a>
            <a href="https://wa.me/393400532931?text=Ciao%20Luigi,%20vorrei%20ordinare%20questa%20creazione:%20${encodeURIComponent(item.url)}" class="order-btn">🛒 Ordina</a>
          </div>
        </div>
      `;
    });
});
</script>

</body>
</html>
