<script>
fetch("https://api.jsonbin.io/v3/b/6a4291bbda38895dfe10daed/latest", {

})
.then(r => r.json())

  const items = data.record.items || [];
  const grid = document.querySelector(".grid");

  items
    .filter(item => item.session === "festadonne" && item.type === "image")

});
