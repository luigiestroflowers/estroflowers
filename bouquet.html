<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Bouquet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background: #fafafa; padding: 20px; }
img { width: 100%; max-width: 350px; margin: 15px auto; display: block; border-radius: 12px; }
</style>
</head>

<body>
<h1>Bouquet</h1>

<div id="gallery"></div>

<script>
const binUrl = "https://api.jsonbin.io/v3/b/6a430ac3da38895dfe13066d";
const masterKey = "$2a$10$NZYSwyr6GBRRDuJiqoqYsuRa94uuDeZXzZ0KeDa5Xh932ItjcHo8m";

async function load() {
  const res = await fetch(binUrl + "/latest", {
    headers: { "X-Master-Key": masterKey }
  });
  const data = await res.json();
  const items = data.record.items || [];

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  items.forEach(item => {
    gallery.innerHTML += `<img src="${item.url}">`;
  });
}

load();
</script>

</body>
</html>
