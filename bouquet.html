<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Bouquet - ESTRO FLOWERS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="IMG_9611.png" class="sidebar-logo">
      <h3>ESTRO FLOWERS</h3>
    </div>

    <ul class="sidebar-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="bouquet.html" class="active">Bouquet</a></li>
      <li><a href="eventi.html">Eventi</a></li>
      <li><a href="homedecor.html">Home Decor</a></li>
      <li><a href="significato-fiori.html">Fiori & Significato</a></li>
     
    </ul>
  </div>

  <button class="menu-toggle" id="menu-toggle">☰</button>
</header>

<section class="hero-full">
  <div class="overlay"></div>

  <div class="hero-content">
    <img src="IMG_9611.png" class="hero-logo">
    <h1>Bouquet</h1>
    <p class="hero-subtitle">Composizioni floreali eleganti per ogni occasione</p>
  </div>
</section>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>
  const toggle = document.getElementById("menu-toggle");
  const sidebar = document.getElementById("sidebar");
  toggle.addEventListener("click", () => sidebar.classList.toggle("open"));
</script>

<script>
const REPO = "luigiestroflowers/estroflowers";
const FOLDER = "img/bouquet";

async function loadBouquet() {
  const url = `https://api.github.com/repos/${REPO}/contents/${FOLDER}`;

  const response = await fetch(url);
  const files = await response.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  files.forEach(file => {
    const isVideo = file.name.endsWith(".mp4") || file.name.endsWith(".mov");

    const mediaTag = isVideo
      ? `<video src="${file.download_url}" controls muted playsinline></video>`
      : `<img src="${file.download_url}" alt="Bouquet">`;

    grid.innerHTML += `
      <div class="card">
        ${mediaTag}
        <div class="btn-row">
          <a href="https://wa.me/393400532931?text=Ciao%20Luigi,%20mi%20piace%20questa%20creazione:%20${encodeURIComponent(file.download_url)}" class="like-btn">❤️ Like</a>
          <a href="https://wa.me/393400532931?text=Ciao%20Luigi,%20vorrei%20ordinare%20questa%20creazione:%20${encodeURIComponent(file.download_url)}" class="order-btn">🛒 Ordina</a>
        </div>
      </div>
    `;
  });
}

loadBouquet();
</script>

</body>
</html>
