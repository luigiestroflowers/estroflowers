<div id="galleria"></div>

<script>
async function caricaGalleria() {
  const response = await fetch("https://api.jsonbin.io/v3/b/https://api.jsonbin.io/v3/b/6a430ac3da38895dfe13066d/latest");
  const data = await response.json();
  const urls = data.record.foto;

  const container = document.getElementById("galleria");
  container.innerHTML = "";

  urls.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    img.style.width = "250px";
    img.style.margin = "10px";
    img.style.borderRadius = "10px";
    container.appendChild(img);
  });
}

caricaGalleria();
</script>
